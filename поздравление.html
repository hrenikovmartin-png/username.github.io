<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>8 Марта — весеннее поздравление</title>
    <!-- Google Fonts (разрешены) -->
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fbe9f0 0%, #d4e6f1 70%, #f1d9e6 100%);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
            padding: 16px;
        }

        /* контейнер для параллакса */
        .parallax-wrapper {
            width: 100%;
            max-width: 1200px;
            perspective: 800px;
            transform-style: preserve-3d;
        }

        /* основная открытка */
        .card {
            position: relative;
            width: 100%;
            background: rgba(255, 250, 240, 0.3);
            backdrop-filter: blur(3px);
            border-radius: 48px 16px 48px 16px;
            box-shadow: 0 25px 50px -8px rgba(230, 120, 160, 0.3), 0 0 0 2px #fff8 inset;
            padding: 2rem 2rem 3rem;
            transition: transform 0.2s ease-out;
            will-change: transform;
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        /* слои для параллакса */
        .parallax-layer {
            transition: transform 0.15s cubic-bezier(0.1, 0.7, 0.3, 1);
            will-change: transform;
        }

        .layer-back {
            transform: translateZ(-30px) scale(1.1);
        }
        .layer-base {
            transform: translateZ(0);
        }
        .layer-front {
            transform: translateZ(20px);
        }

        /* заголовок */
        h1 {
            font-family: 'Pacifico', cursive;
            font-size: clamp(2.5rem, 12vw, 4.5rem);
            font-weight: 400;
            background: linear-gradient(135deg, #b3406c, #d86f9c, #f5b3c7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(230, 120, 160, 0.3);
            margin-bottom: 0.25rem;
            line-height: 1.2;
            text-align: center;
            animation: fadeInDown 1s ease-out;
        }

        .sub {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #6b4e5e;
            text-align: center;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 1.2s 0.4s forwards;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* блок с цветами (букет) */
        .flowers {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
            gap: 1rem 2rem;
            margin: 2.5rem 0 2rem;
            perspective: 500px;
        }

        .flower-item {
            font-size: clamp(3rem, 15vw, 5.5rem);
            display: inline-block;
            filter: drop-shadow(0 10px 8px rgba(190, 120, 140, 0.4));
            cursor: pointer;
            transition: transform 0.2s ease, filter 0.3s;
            animation: bloom 0.9s cubic-bezier(0.2, 0.9, 0.3, 1.2) forwards;
            opacity: 0;
            transform: scale(0) rotate(-10deg);
            user-select: none;
        }

        .flower-item:nth-child(1) { animation-delay: 0.2s; }
        .flower-item:nth-child(2) { animation-delay: 0.35s; }
        .flower-item:nth-child(3) { animation-delay: 0.5s; }
        .flower-item:nth-child(4) { animation-delay: 0.65s; }
        .flower-item:nth-child(5) { animation-delay: 0.8s; }
        .flower-item:nth-child(6) { animation-delay: 0.95s; }

        .flower-item:hover {
            transform: scale(1.2) rotate(3deg) !important;
            filter: drop-shadow(0 15px 12px #d69dbb);
        }

        /* текст поздравления (поэтапное появление) */
        .greeting {
            max-width: 700px;
            margin: 1rem auto 2rem;
            text-align: center;
            font-size: 1.4rem;
            line-height: 2;
            color: #3f2e38;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px);
            border-radius: 70px 20px 70px 20px;
            padding: 1.8rem 1.5rem;
            border: 1px solid #fff9;
            box-shadow: 0 15px 25px -15px #b38b9e;
        }

        .greeting p {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.8s forwards;
        }

        .greeting p:nth-child(1) { animation-delay: 1.2s; }
        .greeting p:nth-child(2) { animation-delay: 1.7s; }
        .greeting p:nth-child(3) { animation-delay: 2.2s; }
        .greeting p:nth-child(4) { animation-delay: 2.7s; }

        .greeting p:last-child {
            margin-top: 1rem;
            font-size: 1.1rem;
            font-style: italic;
            color: #a6577a;
        }

        /* маленькая божья коровка — скрытый сюрприз */
        .ladybug {
            position: absolute;
            bottom: 15px;
            left: 15px;
            width: 50px;
            height: 50px;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.3s, transform 0.2s;
            z-index: 25;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.1));
            animation: crawl 8s infinite alternate ease-in-out;
        }

        .ladybug:hover {
            opacity: 1;
            transform: scale(1.2);
        }

        /* рисованная божья коровка CSS */
        .ladybug-body {
            width: 40px;
            height: 35px;
            background: #d33;
            border-radius: 50% 50% 45% 45%;
            position: relative;
            box-shadow: 0 8px 0 #a22 inset, 0 0 0 2px #400;
        }

        .ladybug-spot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #111;
            border-radius: 50%;
        }

        .spot1 { top: 8px; left: 8px; }
        .spot2 { top: 15px; left: 20px; }
        .spot3 { top: 8px; right: 8px; }
        .spot4 { bottom: 8px; left: 12px; }
        .spot5 { bottom: 8px; right: 12px; }

        .ladybug-head {
            width: 16px;
            height: 14px;
            background: #111;
            border-radius: 40% 40% 30% 30%;
            position: absolute;
            top: -5px;
            left: 12px;
        }

        .ladybug-antenna {
            position: absolute;
            width: 10px;
            height: 2px;
            background: #222;
            top: -7px;
            left: 18px;
            transform: rotate(-20deg);
        }
        .ladybug-antenna::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #222;
            top: -3px;
            right: -3px;
        }

        /* кнопка-сердечко (интерактив) */
        .heart-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: none;
            border: none;
            font-size: 2.5rem;
            cursor: pointer;
            transition: 0.2s;
            z-index: 30;
            filter: drop-shadow(0 4px 6px #f3a7b9);
            animation: pulse 1.8s infinite;
        }

        .heart-btn:hover {
            transform: scale(1.2);
        }

        /* всплывающее сообщение */
        .popup-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: #ffecf0;
            color: #a1355b;
            padding: 12px 30px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.3rem;
            box-shadow: 0 10px 20px #dba6b9;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
            z-index: 999;
            white-space: nowrap;
            border: 2px solid white;
        }

        .popup-message.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            pointer-events: none;
        }

        /* canvas для лепестков и конфетти */
        #petals-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        /* подпись */
        .signature {
            text-align: center;
            margin-top: 30px;
            font-size: 1.1rem;
            color: #6e4f5e;
            opacity: 0;
            animation: fadeIn 1s 3s forwards;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* ключевые кадры */
        @keyframes bloom {
            0% { opacity: 0; transform: scale(0) rotate(-20deg); }
            70% { opacity: 0.9; transform: scale(1.1) rotate(4deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        @keyframes crawl {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(15px, -5px) rotate(3deg); }
            50% { transform: translate(5px, 10px) rotate(-2deg); }
            75% { transform: translate(-10px, 0px) rotate(1deg); }
            100% { transform: translate(0, -5px) rotate(0deg); }
        }

        /* адаптивность */
        @media (max-width: 600px) {
            .card { padding: 1.5rem 1rem 2.5rem; }
            .greeting { font-size: 1.1rem; padding: 1.2rem; }
            .flower-item { font-size: 3.5rem; }
            .heart-btn { font-size: 2rem; top: 15px; right: 15px; }
            .ladybug { width: 40px; height: 40px; bottom: 5px; left: 5px; }
            .ladybug-body { width: 30px; height: 27px; }
            .popup-message { font-size: 1rem; white-space: normal; width: 80%; text-align: center; }
        }
    </style>
</head>
<body>

<canvas id="petals-canvas"></canvas>

<div class="parallax-wrapper" id="parallaxWrapper">
    <div class="card" id="card">
        <!-- слой заднего фона (параллакс) -->
        <div class="parallax-layer layer-back" id="backLayer"></div>

        <!-- основной контент -->
        <div class="parallax-layer layer-base" id="baseLayer">
            <h1>С 8 Марта!</h1>
            <div class="sub">🌷 весна внутри тебя 🌷</div>

            <!-- цветочный букет (интерактивные эмодзи) -->
            <div class="flowers" id="flowerBouquet">
                <span class="flower-item" data-flower="🌷">🌷</span>
                <span class="flower-item" data-flower="🌸">🌸</span>
                <span class="flower-item" data-flower="🌹">🌹</span>
                <span class="flower-item" data-flower="🌼">🌼</span>
                <span class="flower-item" data-flower="🌺">🌺</span>
                <span class="flower-item" data-flower="🌻">🌻</span>
            </div>

            <!-- поздравление (поэтапный текст) -->
            <div class="greeting">
                <p>Пусть тают снега за окном,</p>
                <p>А в сердце цветёт сирень,</p>
                <p>Улыбка сияет теплом,</p>
                <p>Счастливым будет каждый день!</p>
                <p>— С любовью, твоя команда ❤️</p>
            </div>
        </div>

        <!-- передний слой (параллакс) — кнопка и божья коровка -->
        <div class="parallax-layer layer-front" id="frontLayer">
            <button class="heart-btn" id="heartButton">❤️</button>
            <!-- скрытый сюрприз: божья коровка -->
            <div class="ladybug" id="ladybugSurprise">
                <div class="ladybug-body">
                    <div class="ladybug-spot spot1"></div>
                    <div class="ladybug-spot spot2"></div>
                    <div class="ladybug-spot spot3"></div>
                    <div class="ladybug-spot spot4"></div>
                    <div class="ladybug-spot spot5"></div>
                    <div class="ladybug-head"></div>
                    <div class="ladybug-antenna"></div>
                </div>
            </div>
        </div>

        <div class="signature">С любовью и нежностью</div>
    </div>
</div>

<!-- всплывающее уведомление -->
<div class="popup-message" id="popupMessage">🌸 волшебное пожелание 🌸</div>

<script>
    (function() {
        // ---------- НАСТРОЙКИ ----------
        const TEXT_POPUP = {
            flower: 'Ты прекрасна! ✨',
            heart: 'Счастья, любви и весны! 💖',
            ladybug: '🍀 Сюрприз! Пусть удача улыбнётся! 🐞'
        };

        // ---------- 1. ПАДАЮЩИЕ ЛЕПЕСТКИ (И КОНФЕТТИ) ЧЕРЕЗ CANVAS ----------
        const canvas = document.getElementById('petals-canvas');
        const ctx = canvas.getContext('2d');
        let width = window.innerWidth;
        let height = window.innerHeight;

        let particles = [];  // общий массив частиц (лепестки + конфетти)

        function resizeCanvas() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // класс частицы
        class Particle {
            constructor(type = 'petal', x, y) {
                this.type = type; // 'petal' или 'heart'
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height - height;
                this.size = type === 'heart' ? 12 + Math.random() * 10 : 8 + Math.random() * 15;
                this.speedY = type === 'heart' ? 1 + Math.random() * 3 : 0.5 + Math.random() * 1.5;
                this.speedX = (Math.random() - 0.5) * 0.4;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotateSpeed = (Math.random() - 0.5) * 0.02;
                this.opacity = 0.7 + Math.random() * 0.3;
                this.life = 1; // для конфетти (уменьшается)
                this.color = type === 'heart' ? '#ff3366' : '#f9c7d3'; // лепестки розовые
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.type === 'heart') {
                    this.life -= 0.003; // постепенно исчезают
                    this.opacity = this.life;
                }

                // вращение
                this.rotation += this.rotateSpeed;

                // если улетел за нижний край или стал невидимым
                if (this.y > height + 50 || (this.type === 'heart' && this.life <= 0.02)) {
                    return false; // удалить
                }
                // возвращаем наверх если лепесток
                if (this.type === 'petal' && this.y > height + 30) {
                    this.y = -20;
                    this.x = Math.random() * width;
                }
                return true;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.opacity;

                if (this.type === 'heart') {
                    // рисуем сердечко
                    ctx.font = `${this.size}px 'Segoe UI', 'Arial', 'sans-serif'`;
                    ctx.fillStyle = this.color;
                    ctx.fillText('❤️', -this.size/2, this.size/2);
                } else {
                    // лепесток — рисуем нечто похожее на лепесток (овал)
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size * 0.7, this.size * 0.4, 0, 0, Math.PI * 2);
                    ctx.fillStyle = this.color;
                    ctx.shadowColor = '#f48fb1';
                    ctx.shadowBlur = 8;
                    ctx.fill();
                    // маленькая прожилка
                    ctx.beginPath();
                    ctx.ellipse(-2, -1, 2, 1, 0, 0, Math.PI * 2);
                    ctx.fillStyle = '#ffffff60';
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // инициализация лепестков (30 штук)
        for (let i = 0; i < 35; i++) {
            particles.push(new Particle('petal'));
        }

        // функция добавления конфетти (сердечки)
        function addConfetti(count = 25, x, y) {
            for (let i = 0; i < count; i++) {
                let heart = new Particle('heart', x, y);
                heart.speedY = -1 - Math.random() * 4;  // вверх
                heart.speedX = (Math.random() - 0.5) * 2;
                heart.life = 1.2;
                particles.push(heart);
            }
        }

        // анимация
        function animateParticles() {
            ctx.clearRect(0, 0, width, height);
            for (let i = particles.length - 1; i >= 0; i--) {
                if (!particles[i].update()) {
                    particles.splice(i, 1);
                } else {
                    particles[i].draw(ctx);
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ---------- 2. ИНТЕРАКТИВ: ПОПАП И КОНФЕТТИ ----------
        const popup = document.getElementById('popupMessage');

        function showMessage(text, x, y) {
            popup.textContent = text;
            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 2000);
        }

        // обработчик на цветы (эмодзи)
        document.querySelectorAll('.flower-item').forEach(flower => {
            flower.addEventListener('click', (e) => {
                const rect = e.target.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                addConfetti(18, cx, cy);
                showMessage(TEXT_POPUP.flower, cx, cy);
            });
        });

        // сердечко-кнопка
        document.getElementById('heartButton').addEventListener('click', (e) => {
            const rect = e.target.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            addConfetti(30, cx, cy);
            showMessage(TEXT_POPUP.heart, cx, cy);
        });

        // скрытый сюрприз — божья коровка
        document.getElementById('ladybugSurprise').addEventListener('click', (e) => {
            const rect = e.target.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            addConfetti(40, cx, cy);
            showMessage(TEXT_POPUP.ladybug, cx, cy);
            // дополнительно меняем фон на пару секунд (немного магии)
            document.body.style.background = 'linear-gradient(145deg, #ffe6f0, #d8f0d8, #ffe6f5)';
            setTimeout(() => {
                document.body.style.background = 'linear-gradient(145deg, #fbe9f0 0%, #d4e6f1 70%, #f1d9e6 100%)';
            }, 800);
        });

        // ---------- 3. ПАРАЛЛАКС ПРИ ДВИЖЕНИИ МЫШИ ----------
        const wrapper = document.getElementById('parallaxWrapper');
        const backLayer = document.getElementById('backLayer');
        const baseLayer = document.getElementById('baseLayer');
        const frontLayer = document.getElementById('frontLayer');
        const card = document.getElementById('card');

        let mouseX = 0, mouseY = 0;
        let currentX = 0, currentY = 0;

        window.addEventListener('mousemove', (e) => {
            // координаты относительно центра окна
            mouseX = (e.clientX / width - 0.5) * 2;  // от -1 до 1
            mouseY = (e.clientY / height - 0.5) * 2;
        });

        function parallaxEffect() {
            // плавно приближаем текущие значения
            currentX += (mouseX - currentX) * 0.05;
            currentY += (mouseY - currentY) * 0.05;

            // применяем смещение к слоям с разной интенсивностью
            if (backLayer) {
                backLayer.style.transform = `translateZ(-30px) scale(1.1) translate(${currentX * -15}px, ${currentY * -10}px)`;
            }
            if (baseLayer) {
                baseLayer.style.transform = `translateZ(0) translate(${currentX * -5}px, ${currentY * -4}px)`;
            }
            if (frontLayer) {
                frontLayer.style.transform = `translateZ(20px) translate(${currentX * 8}px, ${currentY * 6}px)`;
            }
            requestAnimationFrame(parallaxEffect);
        }
        parallaxEffect();

        // для touch-устройств отключаем параллакс или делаем статичным
        if ('ontouchstart' in window) {
            // на мобильных просто убираем динамический сдвиг
            // оставляем без смещения
        }

        // дополнительно: добавляем появление еще лепестков при клике на фон (необязательно)
        canvas.addEventListener('click', (e) => {
            addConfetti(12, e.clientX, e.clientY);
        });

        // адаптация для мобильных: при касании божьей коровки не будет конфетти из-за встроенного обработчика
        // всё ок

        // небольшая инициализация дополнительных лепестков (чтобы было красиво)
        setInterval(() => {
            if (particles.length < 70) {
                particles.push(new Particle('petal'));
            }
        }, 3000);
    })();
</script>
</body>
</html>
